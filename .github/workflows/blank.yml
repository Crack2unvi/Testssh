name: SSH Debugging with tmate

on:
  workflow_dispatch:

jobs:
  debug_job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Diskte Yer Aç (Gereksiz paketleri siler)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          
      - name: Repoyu Klonla (Checkout code)
        uses: actions/checkout@v4
      
      - name: Tmate ile SSH Oturumu Başlat
        uses: mxschmitt/action-tmate@v3
      
        
