name: SSH Debugging with Tailscale

on:
  workflow_dispatch: # Manuel başlatmak için

jobs:
  debug_job:
    runs-on: ubuntu-latest
    
    steps:
      
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Tailscale'e Bağlan
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: SSH Anahtarını Yetkilendir
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MY_SSH_KEY }}" >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          chmod 700 ~/.ssh

      - name: SSH Bilgilerini Göster ve Bekle
        run: |
          TS_IP=$(tailscale ip -4)
          echo "======================================================="
          echo "BAĞLANTI BAŞARILI!"
          echo "Terminalinden şu komutu yazarak bağlan:"
          echo ""
          echo "  ssh runner@$TS_IP"
          echo ""
          echo "Not: İşin bittiğinde GitHub Actions panelinden 'Cancel run' diyebilirsin."
          echo "======================================================="
          
          sleep 21600
          
          
